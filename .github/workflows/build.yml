name: Build KoalaCast.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install pkg
        run: npm install -g pkg

      - name: Build KoalaCast.exe
        run: pkg server.js --targets node18-win-x64 --output KoalaCast.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KoalaCast
          path: KoalaCast.exe
          retention-days: 30
